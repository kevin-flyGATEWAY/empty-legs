name: Scrape Empty Legs

on:
  schedule:
    - cron: '0 1 * * *'   # 1:00 AM UTC daily
  workflow_dispatch:        # allow manual runs from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run crawler
        run: python crawler.py

      - name: Inject data into index.html
        run: python inject.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add empty_legs.json index.html
          git diff --cached --quiet || git commit -m "chore: update empty legs data [$(date -u '+%Y-%m-%d')]"
          git push
